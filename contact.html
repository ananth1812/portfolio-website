<!DOCTYPE html>

<html lang="en">


<head>

<meta charset="UTF-8">


<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>Contact | Anand Raj</title>


<meta name="description"
content="Contact form page">


<link rel="stylesheet" href="css/style.css">


</head>



<body>



<header>

<nav aria-label="Contact Navigation">

<a href="index.html">Home</a>

</nav>

</header>



<main>


<section>


<h1>Contact Me</h1>



<form action="#" method="post">


<label for="name">
Name
</label>

<input 
type="text"
id="name"
name="name"
required
aria-required="true">



<label for="email">
Email
</label>


<input
type="email"
id="email"
name="email"
required
aria-required="true">



<label for="message">

Message

</label>


<textarea
id="message"
name="message"
rows="5"
required>

</textarea>



<button type="submit">

Send Message

</button>


</form>


</section>


</main>



<footer>

<p>
Accessible Contact Page
</p>


</footer>


</body>


</html>
